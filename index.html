<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barbaleo Club</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--gold:#C9A84C;--gold-light:#E2C068;--gold-dark:#8A6A28;--gold-dim:rgba(201,168,76,0.2);--bg:#0D0B09;--bg2:#161310;--bg3:#1E1A14;--bg4:#26211A;--bg5:#302A20;--cream:#F0E6CC;--cream2:#C8B98A;--muted:#6B6050;--danger:#C0392B;--success:#27AE60;--r:10px;--rs:6px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden;font-size:15px}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
.hdr{background:var(--bg2);border-bottom:1px solid var(--gold-dim);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-crown{font-size:18px;line-height:1}
.hdr-name{font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-weight:600}
.hdr-back{background:none;color:var(--gold);font-size:22px;padding:4px 8px 4px 0;line-height:1}
.hdr-title{font-size:14px;color:var(--cream);letter-spacing:1px;flex:1;text-align:center}
.hdr-action{background:none;color:var(--gold);font-size:12px;letter-spacing:1px;padding:4px 0}
.bnav{background:var(--bg2);border-top:1px solid var(--gold-dim);display:flex;position:sticky;bottom:0;z-index:100}
.bnav-btn{flex:1;padding:9px 4px 7px;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
.bnav-btn.active{color:var(--gold)}
.bnav-icon{font-size:19px;line-height:1}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.sec-title{font-size:10px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--gold-dim)}
.sec-title:first-child{margin-top:0}
.card{background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card.gold-border{border-color:var(--gold-dim)}
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);font-size:14px;font-weight:600;letter-spacing:1px;text-align:center;transition:all .15s}
.btn-gold{background:var(--gold);color:#0D0B09}.btn-gold:active{background:var(--gold-light)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}.btn-outline:active{background:var(--gold-dim)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;display:inline-block}
.btn-icon{background:none;color:var(--gold);font-size:18px;padding:6px}
/* BARBER CARDS */
.barber-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.barber-card{background:var(--bg3);border:2px solid var(--bg5);border-radius:var(--r);padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s}
.barber-card:active,.barber-card.selected{border-color:var(--gold);background:var(--bg4)}
.barber-avatar{width:72px;height:72px;border-radius:50%;background:var(--bg4);border:2px solid var(--gold-dim);margin:0 auto 10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold)}
.barber-avatar img{width:100%;height:100%;object-fit:cover}
.barber-name{font-size:14px;color:var(--cream);font-weight:500}
/* SERVICES */
.svc-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg5)}
.svc-item:last-child{border-bottom:none}
.svc-check{width:22px;height:22px;border-radius:4px;border:1.5px solid var(--gold-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer}
.svc-check.checked{background:var(--gold);border-color:var(--gold)}
.svc-check svg{width:13px;height:13px;stroke:#0D0B09;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .15s}
.svc-check.checked svg{opacity:1}
.svc-info{flex:1;cursor:pointer}
.svc-name{font-size:14px;color:var(--cream);line-height:1.3}
.svc-meta{font-size:12px;color:var(--muted);margin-top:2px}
.svc-price{font-size:14px;color:var(--gold);font-weight:600;flex-shrink:0}
/* CALENDAR */
.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.date-label{font-size:10px;text-align:center;color:var(--muted);padding:4px 0}
.date-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.date-cell.today{border-color:var(--gold-dark);color:var(--gold)}
.date-cell.selected{background:var(--gold);color:#0D0B09;font-weight:700}
.date-cell.past,.date-cell.off{color:var(--muted);pointer-events:none;opacity:0.3}
.date-cell.available:not(.selected):hover{background:var(--bg4)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav-btn{background:none;color:var(--gold);font-size:22px;padding:4px 12px}
.cal-month{font-size:14px;letter-spacing:1px;color:var(--cream)}
/* TIME SLOTS */
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.time-slot{padding:10px 4px;text-align:center;border-radius:var(--rs);border:1px solid var(--bg5);font-size:13px;cursor:pointer;transition:all .15s;color:var(--cream2)}
.time-slot.selected{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);font-weight:600}
.time-slot.busy{background:var(--bg4);color:var(--muted);pointer-events:none;text-decoration:line-through;opacity:0.6}
.time-slot.free:not(.selected):hover{border-color:var(--gold-dark)}
/* SUMMARY */
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg5)}
.summary-row:last-child{border-bottom:none}
.summary-row.total{border-top:1px solid var(--gold-dim);margin-top:6px;padding-top:12px}
.summary-label{font-size:13px;color:var(--muted)}
.summary-val{font-size:13px;color:var(--cream)}
.summary-val.gold{color:var(--gold);font-weight:700;font-size:15px}
/* BOOKING CARDS */
.booking-card{background:var(--bg3);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;margin-bottom:8px}
.booking-card.done{border-left-color:var(--success)}
.booking-card.cancelled{border-left-color:var(--danger);opacity:0.6}
.booking-time{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:4px}
.booking-client{font-size:14px;color:var(--cream)}
.booking-services{font-size:12px;color:var(--muted);margin-top:3px}
.booking-actions{display:flex;gap:8px;margin-top:10px}
/* FORMS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--rs);padding:11px 13px;color:var(--cream);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}
/* BADGES */
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.badge-pending{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-done{background:rgba(39,174,96,0.15);color:#27AE60}
.badge-cancelled{background:rgba(192,57,43,0.15);color:#C0392B}
.badge-admin{background:rgba(201,168,76,0.2);color:var(--gold)}
.badge-barber{background:rgba(93,202,165,0.15);color:#5DCAA5}
.badge-client{background:rgba(107,96,80,0.2);color:var(--muted)}
/* PROFILE */
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:18px;text-align:center;color:var(--cream);margin-bottom:4px}
.profile-sub{font-size:12px;text-align:center;color:var(--muted);margin-bottom:20px}
.hist-item{background:var(--bg3);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;border:1px solid var(--bg5)}
.hist-date{font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hist-services{font-size:13px;color:var(--cream);margin-bottom:4px}
.hist-price{font-size:13px;color:var(--gold);font-weight:600}
/* SCHEDULE */
.day-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bg5)}
.day-toggle:last-child{border-bottom:none}
.day-name{font-size:14px;color:var(--cream);width:60px}
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{width:42px;height:24px;background:var(--bg5);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:var(--bg);border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}
.time-range{display:flex;align-items:center;gap:6px}
.time-input{width:72px;background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--rs);padding:6px 8px;color:var(--cream);text-align:center;font-size:13px;outline:none}
.time-input:focus{border-color:var(--gold)}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5}
.empty-text{font-size:14px;line-height:1.5}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 32px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid var(--gold-dim)}
.modal-title{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;text-align:center}
.step-bar{display:flex;gap:4px;padding:12px 16px 0}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--bg5)}
.step-dot.done{background:var(--gold)}
.step-dot.active{background:var(--gold-light)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold-dim);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--cream);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loader{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--bg5);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.admin-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--gold-dim);overflow-x:auto}
.admin-tab{flex-shrink:0;padding:11px 12px;background:none;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.client-card{background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.client-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg4);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.client-avatar img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div id="app">

<!-- ГЛАВНАЯ -->
<div id="screen-home" class="screen active">
  <div class="hdr">
    <div class="hdr-logo"><span class="hdr-crown">♛</span><span class="hdr-name">Barbaleo</span></div>
    <button class="hdr-action" onclick="Nav.go('profile')">Профиль</button>
  </div>
  <div class="content" id="home-content"><div class="loader"><div class="spinner"></div></div></div>
  <div class="bnav">
    <button class="bnav-btn active" onclick="Nav.go('home')"><span class="bnav-icon">✂</span>Запись</button>
    <button class="bnav-btn" onclick="Nav.go('profile')"><span class="bnav-icon">◉</span>Профиль</button>
  </div>
</div>

<!-- ВЫБОР БАРБЕРА -->
<div id="screen-barber" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="Nav.go('home')">‹</button>
    <span class="hdr-title">Выберите барбера</span>
    <span style="width:40px"></span>
  </div>
  <div class="step-bar"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div></div>
  <div class="content" id="barber-content"></div>
</div>

<!-- ВЫБОР УСЛУГ -->
<div id="screen-services" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="Nav.go('barber')">‹</button>
    <span class="hdr-title" id="svc-screen-title">Выбор услуг</span>
    <span style="width:40px"></span>
  </div>
  <div class="step-bar"><div class="step-dot done"></div><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div></div>
  <div class="content" id="services-content"></div>
  <div style="padding:12px 16px;background:var(--bg)">
    <div id="svc-summary" style="display:none" class="card gold-border">
      <div class="summary-row total">
        <span class="summary-label">Итого</span>
        <span class="summary-val gold" id="svc-total-price">0 ₽</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px" id="svc-total-dur"></div>
    </div>
    <button class="btn btn-gold" onclick="Booking.nextToDate()" id="btn-next-date" disabled style="opacity:0.4">Выбрать дату →</button>
  </div>
</div>

<!-- ДАТА И ВРЕМЯ -->
<div id="screen-datetime" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="Nav.go('services')">‹</button>
    <span class="hdr-title">Дата и время</span>
    <span style="width:40px"></span>
  </div>
  <div class="step-bar"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot active"></div><div class="step-dot"></div></div>
  <div class="content" id="datetime-content"></div>
  <div style="padding:12px 16px;background:var(--bg)">
    <button class="btn btn-gold" onclick="Booking.nextToConfirm()" id="btn-next-confirm" disabled style="opacity:0.4">Далее →</button>
  </div>
</div>

<!-- ПОДТВЕРЖДЕНИЕ -->
<div id="screen-confirm" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="Nav.go('datetime')">‹</button>
    <span class="hdr-title">Подтверждение</span>
    <span style="width:40px"></span>
  </div>
  <div class="step-bar"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot active"></div></div>
  <div class="content" id="confirm-content"></div>
</div>

<!-- ПРОФИЛЬ -->
<div id="screen-profile" class="screen">
  <div class="hdr">
    <div class="hdr-logo"><span class="hdr-crown">♛</span><span class="hdr-name">Barbaleo</span></div>
    <span style="width:60px"></span>
  </div>
  <div class="content" id="profile-content"><div class="loader"><div class="spinner"></div></div></div>
  <div class="bnav">
    <button class="bnav-btn" onclick="Nav.go('home')"><span class="bnav-icon">✂</span>Запись</button>
    <button class="bnav-btn active" onclick="Nav.go('profile')"><span class="bnav-icon">◉</span>Профиль</button>
  </div>
</div>

<!-- АДМИНКА -->
<div id="screen-admin" class="screen">
  <div class="hdr">
    <div class="hdr-logo"><span class="hdr-crown">♛</span><span class="hdr-name">Админка</span></div>
    <button class="hdr-action" onclick="Nav.go('home')">Выход</button>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="Admin.tab('bookings',this)">Записи</button>
    <button class="admin-tab" onclick="Admin.tab('barbers',this)">Барберы</button>
    <button class="admin-tab" onclick="Admin.tab('services',this)">Услуги</button>
    <button class="admin-tab" onclick="Admin.tab('schedule',this)">График</button>
    <button class="admin-tab" onclick="Admin.tab('clients',this)">Клиенты</button>
    <button class="admin-tab" onclick="Admin.tab('history',this)">История</button>
  </div>
  <div class="content" id="admin-content"><div class="loader"><div class="spinner"></div></div></div>
</div>

<!-- ПАНЕЛЬ БАРБЕРА -->
<div id="screen-barber-panel" class="screen">
  <div class="hdr">
    <div class="hdr-logo"><span class="hdr-crown">✂</span><span class="hdr-name" id="barber-panel-name">Барбер</span></div>
    <button class="hdr-action" onclick="Nav.go('home')">Выход</button>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="BarberPanel.tab('bookings',this)">Мои записи</button>
    <button class="admin-tab" onclick="BarberPanel.tab('schedule',this)">Мой график</button>
  </div>
  <div class="content" id="barber-panel-content"><div class="loader"><div class="spinner"></div></div></div>
</div>

<!-- MODAL: Услуга -->
<div class="modal-overlay hidden" id="modal-service">
  <div class="modal">
    <div class="modal-title" id="modal-svc-title">Новая услуга</div>
    <input type="hidden" id="svc-edit-id">
    <div class="field"><label>Название</label><input id="svc-name" type="text" placeholder="Мужская стрижка"></div>
    <div class="field-row">
      <div class="field"><label>Цена (₽)</label><input id="svc-price" type="number" placeholder="1200"></div>
      <div class="field"><label>Длительность (мин)</label><input id="svc-duration" type="number" placeholder="60"></div>
    </div>
    <div class="field"><label>Описание (опц.)</label><input id="svc-desc" type="text" placeholder="Краткое описание"></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-outline" style="flex:1;padding:12px" onclick="Modal.close('modal-service')">Отмена</button>
      <button class="btn btn-gold" style="flex:1;padding:12px" onclick="Admin.saveService()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: Барбер -->
<div class="modal-overlay hidden" id="modal-barber">
  <div class="modal">
    <div class="modal-title" id="modal-barber-title">Новый барбер</div>
    <input type="hidden" id="barber-edit-id">
    <div class="field"><label>Имя</label><input id="barber-name" type="text" placeholder="Имя барбера"></div>
    <div class="field"><label>Фото (URL)</label><input id="barber-photo" type="url" placeholder="https://..."></div>
    <div class="field"><label>Telegram ID (для уведомлений)</label><input id="barber-tg-id" type="text" placeholder="123456789"></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-outline" style="flex:1;padding:12px" onclick="Modal.close('modal-barber')">Отмена</button>
      <button class="btn btn-gold" style="flex:1;padding:12px" onclick="Admin.saveBarber()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: Ручная запись -->
<div class="modal-overlay hidden" id="modal-manual">
  <div class="modal" style="max-height:92vh">
    <div class="modal-title">Ручная запись</div>
    <div id="manual-step1">
      <div class="field"><label>Имя клиента *</label><input id="m-name" type="text" placeholder="Имя клиента"></div>
      <div class="field"><label>Телефон *</label><input id="m-phone" type="tel" placeholder="+7..."></div>
      <button class="btn btn-gold" onclick="Admin.manualStep2()">Далее → Барбер</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="Modal.close('modal-manual')">Отмена</button>
    </div>
    <div id="manual-step2" style="display:none">
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Выберите барбера</div>
      <div id="m-barber-list"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-outline" style="flex:1;padding:12px" onclick="Admin.manualBack(1)">‹ Назад</button>
        <button class="btn btn-gold" style="flex:1;padding:12px" id="m-btn-step3" disabled style="opacity:0.4" onclick="Admin.manualStep3()">Далее → Услуги</button>
      </div>
    </div>
    <div id="manual-step3" style="display:none">

const SB = {

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
const Modal = { open: id => document.getElementById(id).classList.remove('hidden'), close: id => document.getElementById(id).classList.add('hidden') };

function localDateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr() { return localDateStr(new Date()); }
function timeToMin(t) { const p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }

function isOff(dateStr, barberId) {
  const dow = new Date(dateStr+'T12:00:00').getDay();
  // Расписание конкретного барбера
  const key = barberId ? `${barberId}_${dow}` : dow;
  const sched = S.schedule[key] || S.schedule[dow];
  if (!sched || !sched.is_open) return true;
  if (S.daysOff[dateStr]) return true;
  return false;
}

function getBusy(dateStr, barberId) {
  const busy = new Set();
  S.bookings
    .filter(b => b.date === dateStr && b.status !== 'cancelled' && (!barberId || b.barber_id === barberId))
    .forEach(b => {
      const start = timeToMin(b.time);
      const dur = b.total_duration || 30;
      for (let t = start; t < start + dur; t += 30) busy.add(t);
    });
  return busy;
}

async function loadSvcs(all=false) {

  S.services = await SB.get(q) || [];
}
async function loadSched(barberId) {
  // Загружаем расписание для конкретного барбера
  const q = barberId ? `schedule?barber_id=eq.${barberId}` : 'schedule?barber_id=is.null';
  const rows = await SB.get(q) || [];
  rows.forEach(r => {
    const key = barberId ? `${barberId}_${r.day_of_week}` : r.day_of_week;
    S.schedule[key] = r;
  });
}
async function loadAllSched() {
  const rows = await SB.get('schedule') || [];
  S.schedule = {};
  rows.forEach(r => {
    const key = r.barber_id ? `${r.barber_id}_${r.day_of_week}` : r.day_of_week;
    S.schedule[key] = r;
  });
}
async function loadBookings(barberId) {
  const today = todayStr();
  const q = barberId
    ? `bookings?date=gte.${today}&barber_id=eq.${barberId}&status=neq.cancelled&order=date.asc,time.asc`
    : `bookings?date=gte.${today}&status=neq.cancelled&order=date.asc,time.asc`;
  S.bookings = await SB.get(q) || [];
}
async function loadDaysOff(barberId) {
  const today = todayStr();
  const q = barberId ? `days_off?date=gte.${today}&barber_id=eq.${barberId}` : `days_off?date=gte.${today}`;
  const rows = await SB.get(q) || [];
  S.daysOff = {};
  rows.forEach(r => S.daysOff[r.date] = r.id);
}
async function loadBarberServices(barberId) {
  try {
    const rows = await SB.get(`barber_services?barber_id=eq.${barberId}`) || [];
    S.barberSvcs = new Set(rows.map(r => r.service_id));

}

const DateTime = {
  async render() {
    const c = document.getElementById('datetime-content');
    c.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    const bid = S.selBarber?.id;
    await Promise.all([loadAllSched(), loadBookings(bid), loadDaysOff(bid)]);
    this.renderCal();
  },
  renderCal() {
    const c = document.getElementById('datetime-content');
    const y=S.calY, m=S.calM, bid=S.selBarber?.id;
    const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dLabels=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const today=todayStr(), firstDow=new Date(y,m,1).getDay(), lastDay=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDow;i++) cells+='<div></div>';
    for(let d=1;d<=lastDay;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const past=ds<today, off=isOff(ds,bid), sel=ds===S.selDate, tod=ds===today;
      let cls='date-cell';
      if(past) cls+=' past'; else if(off) cls+=' off'; else cls+=' available';
      if(tod&&!past) cls+=' today'; if(sel) cls+=' selected';
      cells+=`<div class="${cls}" ${(!past&&!off)?`onclick="DateTime.pickDate('${ds}')"`:''} >${d}</div>`;
    }
    c.innerHTML=`
      <div class="sec-title">Выберите дату</div>
      <div class="card">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="DateTime.prevM()">‹</button>
          <div class="cal-month">${mNames[m]} ${y}</div>
          <button class="cal-nav-btn" onclick="DateTime.nextM()">›</button>
        </div>
        <div class="date-grid">${dLabels.map(l=>`<div class="date-label">${l}</div>`).join('')}</div>
        <div class="date-grid">${cells}</div>
      </div>
      ${S.selDate?`<div class="sec-title">Выберите время</div><div class="card">${this.renderSlots(S.selDate)}</div>`:''}`;
    const btn=document.getElementById('btn-next-confirm');
    btn.disabled=!(S.selDate&&S.selTime); btn.style.opacity=(S.selDate&&S.selTime)?1:0.4;
  },
  renderSlots(dateStr) {
    const bid=S.selBarber?.id, dow=new Date(dateStr+'T12:00:00').getDay();
    const key=bid?`${bid}_${dow}`:dow;
    const sched=S.schedule[key]||S.schedule[dow];
    if(!sched||!sched.is_open) return '<div style="color:var(--muted);font-size:13px">Выходной день</div>';
    const dur=Booking.totalDur()||30;
    const openMin=timeToMin(sched.open_time), closeMin=timeToMin(sched.close_time);
    const busy=getBusy(dateStr, bid);
    const isToday=dateStr===todayStr(), now=new Date(), nowMin=isToday?now.getHours()*60+now.getMinutes():0;
    const slots=[];
    for(let t=openMin;t+dur<=closeMin;t+=30){
      const isPast=isToday&&t<nowMin+30;
      let isBusy=isPast;
      if(!isBusy){for(let bl=t;bl<t+dur;bl+=30){if(busy.has(bl)){isBusy=true;break;}}}
      const hh=String(Math.floor(t/60)).padStart(2,'0'),mm=String(t%60).padStart(2,'0');
      slots.push({ts:`${hh}:${mm}`,busy:isBusy});
    }
    if(!slots.length) return '<div style="color:var(--muted);font-size:13px">Нет доступных слотов</div>';
    return `<div class="time-grid">${slots.map(s=>`<div class="time-slot ${s.busy?'busy':'free'} ${S.selTime===s.ts?'selected':''}" onclick="${s.busy?'':` DateTime.pickTime('${s.ts}')`}">${s.ts}</div>`).join('')}</div>`;
  },
  pickDate(ds){S.selDate=ds;S.selTime=null;document.getElementById('btn-next-confirm').disabled=true;document.getElementById('btn-next-confirm').style.opacity=0.4;this.renderCal();},
  pickTime(t){S.selTime=t;document.getElementById('btn-next-confirm').disabled=false;document.getElementById('btn-next-confirm').style.opacity=1;this.renderCal();},
  prevM(){if(S.calM===0){S.calM=11;S.calY--;}else S.calM--;this.renderCal();},
  nextM(){if(S.calM===11){S.calM=0;S.calY++;}else S.calM++;this.renderCal();},
};

  async cancel(id, date, time) {
    const d=new Date(date+'T12:00:00').toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
    if(!confirm(`Отменить запись?\n${d} в ${time}`)) return;
    try {
      const rows=await SB.get(`bookings?id=eq.${id}`)||[];
      await SB.patch(`bookings?id=eq.${id}`,{status:'cancelled'});
      if(rows[0]) try{await fetch(CONFIG.BOT_URL+'/notify-cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking:rows[0]})});}catch(e){}

};

  filterBarber(bid){S.adminSelBarber=bid;this.renderBookings();},
  buildDayView(dateStr, bookingMap, filterBarberId){
    const d=new Date(dateStr+'T12:00:00');
    const df=d.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
    const dow=d.getDay();
    // Определяем временной диапазон
    let openMin=9*60, closeMin=21*60;
    const scheds=Object.values(S.schedule).filter(s=>s.day_of_week===dow&&s.is_open&&(!filterBarberId||s.barber_id===filterBarberId));
    if(scheds.length){openMin=Math.min(...scheds.map(s=>timeToMin(s.open_time)));closeMin=Math.max(...scheds.map(s=>timeToMin(s.close_time)));}
    const dayMap=bookingMap[dateStr]||{};
    const sb={pending:'badge-pending',done:'badge-done',cancelled:'badge-cancelled'};
    const sm={pending:'Ожидает',done:'Готово',cancelled:'Отменено'};
    const usedIds=new Set();
    let slotsHtml='';

    for(let t=openMin;t<closeMin;t+=30){
      const bks=dayMap[t]||[];
      const activeBks=bks.filter(b=>!usedIds.has(b.id));
      if(activeBks.length){
        activeBks.forEach(bk=>{
          usedIds.add(bk.id);
          const svcs=(bk.services||[]).map(s=>s.name).join(', ');
          const hh=String(Math.floor(t/60)).padStart(2,'0'),mm=String(t%60).padStart(2,'0');
          slotsHtml+=`<div style="display:flex;gap:8px;margin-bottom:6px;align-items:flex-start">
            <div style="font-size:12px;color:var(--gold);width:38px;flex-shrink:0;padding-top:10px;font-weight:600">${hh}:${mm}</div>
            <div class="booking-card ${bk.status}" style="flex:1;margin-bottom:0;cursor:pointer" onclick="Admin.toggleDetail(${bk.id})">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="booking-time" style="margin-bottom:0">${bk.time.slice(0,5)} · ${bk.total_duration} мин</div>
                <span class="badge ${sb[bk.status]||'badge-pending'}">${sm[bk.status]||bk.status}</span>
              </div>
              ${bk.barber_name&&!filterBarberId?`<div style="font-size:11px;color:var(--gold-dark);margin-top:2px">✂ ${bk.barber_name}</div>`:''}
              <div class="booking-client" style="margin-top:4px">${bk.client_name||'Клиент'}${bk.client_phone?' · '+bk.client_phone:''}</div>
              <div id="bk-detail-${bk.id}" style="display:none">
                <div class="booking-services" style="margin-top:4px">${svcs}</div>
                <div style="font-size:13px;color:var(--gold);margin-top:4px">${(bk.total_price||0).toLocaleString()} ₽</div>
                ${bk.status==='pending'?`<div class="booking-actions">
                  <button class="btn btn-sm" style="background:rgba(39,174,96,0.15);color:#27AE60;border:1px solid rgba(39,174,96,0.3);border-radius:6px;flex:1" onclick="event.stopPropagation();Admin.setStatus(${bk.id},'done')">✓ Выполнено</button>
                  <button class="btn btn-sm" style="background:rgba(192,57,43,0.15);color:#C0392B;border:1px solid rgba(192,57,43,0.3);border-radius:6px;flex:1" onclick="event.stopPropagation();Admin.setStatus(${bk.id},'cancelled')">✕ Отменить</button>
                </div>`:''}
              </div>
            </div>
          </div>`;
        });
      } else {
        // Показываем свободные слоты — если выбран барбер, проверяем его расписание
        const hh=String(Math.floor(t/60)).padStart(2,'0'),mm=String(t%60).padStart(2,'0');
        // Проверяем работает ли барбер в это время
        let barberWorking=true;
        if(filterBarberId){
          const key=`${filterBarberId}_${dow}`;
          const sched=S.schedule[key];
          if(!sched||!sched.is_open) barberWorking=false;
          else{const oMin=timeToMin(sched.open_time),cMin=timeToMin(sched.close_time);if(t<oMin||t>=cMin)barberWorking=false;}
        }
        if(barberWorking){
          slotsHtml+=`<div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
            <div style="font-size:12px;color:var(--muted);width:38px;flex-shrink:0">${hh}:${mm}</div>
            <div style="flex:1;height:32px;border:1px dashed var(--bg5);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--bg5);transition:all .15s" onmouseover="this.style.borderColor='var(--gold-dark)';this.style.color='var(--muted)'" onmouseout="this.style.borderColor='var(--bg5)';this.style.color='var(--bg5)'" onclick="Admin.openManualAt('${dateStr}','${hh}:${mm}')">свободно</div>
          </div>`;
        }
      }
    }

    // Если нет барберов с расписанием на этот день
    if(!slotsHtml){
      slotsHtml='<div style="text-align:center;color:var(--muted);padding:16px;font-size:13px">'+(filterBarberId?'Барбер не работает в этот день':'Нет записей')+'</div>';
    }

    return `<div class="sec-title">${df}</div><div style="background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:12px">${slotsHtml}</div>`;
  },

  initDrag(){

            <div style="display:flex;flex-wrap:wrap;gap:6px">

  async toggleDayOff(ds,barberId){

      else{const r=await SB.post('days_off',{date:ds,barber_id:barberId});S.daysOff[ds]=r?.[0]?.id||ds;showToast('Выходной добавлен');}

  schPrev(){if(S.schM===0){S.schM=11;S.schY--;}else S.schM--;if(S.currentBarber&&document.getElementById('screen-barber-panel').classList.contains('active'))BarberPanel.renderTab('schedule');else this.renderSchedule();},
  schNext(){if(S.schM===11){S.schM=0;S.schY++;}else S.schM++;if(S.currentBarber&&document.getElementById('screen-barber-panel').classList.contains('active'))BarberPanel.renderTab('schedule');else this.renderSchedule();},
  togDay(dow){const t=document.getElementById('tog-'+dow),r=document.getElementById('tr-'+dow);t.classList.toggle('on');const on=t.classList.contains('on');r.style.opacity=on?1:0.3;r.style.pointerEvents=on?'':'none';},
  async saveSched(barberId){
    try{
      const rows=[];
      for(const dow of [0,1,2,3,4,5,6]){
        const t=document.getElementById('tog-'+dow);if(!t)continue;
        const isOpen=t.classList.contains('on');
        const open=(document.getElementById('open-'+dow)?.value||'09:00')+':00';
        const close=(document.getElementById('close-'+dow)?.value||'21:00')+':00';
        rows.push({day_of_week:dow,barber_id:barberId,is_open:isOpen,open_time:open,close_time:close});
        S.schedule[`${barberId}_${dow}`]={day_of_week:dow,barber_id:barberId,is_open:isOpen,open_time:open,close_time:close};
      }
      await SB.upsert('schedule',rows,'barber_id,day_of_week');
      showToast('График сохранён ✓');
    }catch(e){console.error(e);showToast('Ошибка: '+e.message.slice(0,80));}
  },

  renderManualCal(){
    const cal=document.getElementById('m-cal');if(!cal)return;
    const y=S.manualCalY,m=S.manualCalM,bid=S.manualSelBarber?.id;
    const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dLabels=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const today=todayStr(),firstDow=new Date(y,m,1).getDay(),lastDay=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDow;i++)cells+='<div></div>';
    for(let d=1;d<=lastDay;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const past=ds<today,off=isOff(ds,bid),sel=ds===S.manualSelDate,tod=ds===today;
      let cls='date-cell';
      if(past)cls+=' past';else if(off)cls+=' off';else cls+=' available';
      if(tod&&!past)cls+=' today';if(sel)cls+=' selected';
      cells+=`<div class="${cls}" ${(!past&&!off)?`onclick="Admin.manualPickDate('${ds}')"`:''} >${d}</div>`;
    }
    let slotsHtml='';
    if(S.manualSelDate){
      const dow=new Date(S.manualSelDate+'T12:00:00').getDay();
      const key=bid?`${bid}_${dow}`:dow;
      const sched=S.schedule[key];
      if(sched&&sched.is_open){
        const dur=S.manualSelSvcs.reduce((s,id)=>{const x=S.services.find(v=>v.id===id);return s+(x?x.duration_minutes:0);},0)||30;
        const openMin=timeToMin(sched.open_time),closeMin=timeToMin(sched.close_time);
        const busy=getBusy(S.manualSelDate,bid);
        const isToday=S.manualSelDate===todayStr(),now=new Date(),nowMin=isToday?now.getHours()*60+now.getMinutes():0;
        const slots=[];
        for(let t=openMin;t+dur<=closeMin;t+=30){
          const isPast=isToday&&t<nowMin+30;let isBusy=isPast;
          if(!isBusy){for(let bl=t;bl<t+dur;bl+=30){if(busy.has(bl)){isBusy=true;break;}}}
          const hh=String(Math.floor(t/60)).padStart(2,'0'),mm=String(t%60).padStart(2,'0');
          slots.push({ts:`${hh}:${mm}`,busy:isBusy});
        }
        slotsHtml=`<div style="font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--gold-dim)">Выберите время</div>
          <div class="time-grid">${slots.map(s=>`<div class="time-slot ${s.busy?'busy':'free'} ${S.manualSelTime===s.ts?'selected':''}" onclick="${s.busy?'':` Admin.manualPickTime('${s.ts}')`}">${s.ts}</div>`).join('')}</div>`;
      }
    }
    cal.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <button class="cal-nav-btn" onclick="Admin.manualPrevM()">‹</button>
        <span style="font-size:14px;color:var(--cream)">${mNames[m]} ${y}</span>
        <button class="cal-nav-btn" onclick="Admin.manualNextM()">›</button>
      </div>
      <div class="date-grid">${dLabels.map(l=>`<div class="date-label">${l}</div>`).join('')}</div>
      <div class="date-grid">${cells}</div>${slotsHtml}`;
  },
  manualPickDate(ds){S.manualSelDate=ds;S.manualSelTime=null;document.getElementById('m-btn-save').disabled=true;document.getElementById('m-btn-save').style.opacity=0.4;this.renderManualCal();},
  manualPickTime(t){S.manualSelTime=t;document.getElementById('m-btn-save').disabled=false;document.getElementById('m-btn-save').style.opacity=1;this.renderManualCal();},
  manualPrevM(){if(S.manualCalM===0){S.manualCalM=11;S.manualCalY--;}else S.manualCalM--;this.renderManualCal();},
  manualNextM(){if(S.manualCalM===11){S.manualCalM=0;S.manualCalY++;}else S.manualCalM++;this.renderManualCal();},
  manualBack(toStep){
    document.getElementById('manual-step1').style.display=toStep===1?'block':'none';
    document.getElementById('manual-step2').style.display=toStep===2?'block':'none';
    document.getElementById('manual-step3').style.display=toStep===3?'block':'none';

              <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap">
                <span style="font-size:14px;color:var(--cream);font-weight:500">${cl.name}</span>
                <span class="badge ${cl.isAdmin?'badge-admin':'badge-client'}">${cl.isAdmin?'Админ':'Клиент'}</span>
              </div>
              ${cl.username?`<div style="font-size:12px;color:var(--muted)">@${cl.username}</div>`:''}
              ${cl.phone?`<div style="font-size:12px;color:var(--muted)">${cl.phone}</div>`:''}
              <div style="font-size:11px;color:var(--muted);margin-top:3px">${cl.bookings} зап. · ${cl.spent.toLocaleString()} ₽</div>
            </div>
            <button class="btn-icon" style="font-size:16px;flex-shrink:0" onclick="Admin.toggleAdminRole('${cl.id}','${cl.name.replace(/'/g,"\\'")}',${cl.isAdmin})">${cl.isAdmin?'✕':'👑'}</button>
          </div>`).join('')}`:''}
        ${noTgList.length?`<div class="sec-title">Без Telegram (${noTgList.length})</div>
          ${noTgList.map(cl=>`<div class="client-card">
            <div class="client-avatar">${cl.name.charAt(0).toUpperCase()}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;color:var(--cream);font-weight:500;margin-bottom:2px">${cl.name}</div>
              ${cl.phone?`<div style="font-size:12px;color:var(--muted)">${cl.phone}</div>`:''}
              <div style="font-size:11px;color:var(--muted);margin-top:3px">${cl.bookings} зап. · ${cl.spent.toLocaleString()} ₽</div>
            </div>
          </div>`).join('')}`:''}
        ${!tgList.length&&!noTgList.length?'<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Клиентов пока нет</div></div>':''}`;
    }catch(e){document.getElementById('admin-content').innerHTML='<div class="empty"><div class="empty-text">Ошибка</div></div>';}
  },
  async toggleAdminRole(tgId,name,isAdmin){
    if(isAdmin&&tgId===String(CONFIG.ADMIN_TELEGRAM_ID)){showToast('Нельзя снять главного админа');return;}
    if(!confirm(isAdmin?`Снять права у ${name}?`:`Назначить ${name} администратором?`))return;
    try{
      if(isAdmin){await SB.delete(`admins?telegram_id=eq.${tgId}`);showToast('Права сняты');}
      else{await SB.post('admins',{telegram_id:tgId,name});showToast(`${name} — теперь администратор`);}
      this.renderClients();
    }catch(e){showToast('Ошибка');}
  },

  // ── ИСТОРИЯ ──
  async renderHistory(){
    const c=document.getElementById('admin-content');
    if(!S.histY){S.histY=new Date().getFullYear();S.histM=new Date().getMonth();}
    const y=S.histY,m=S.histM;
    const from=`${y}-${String(m+1).padStart(2,'0')}-01`;
    const lastDay=new Date(y,m+1,0).getDate();
    const to=`${y}-${String(m+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    let allBks=[];
    try{allBks=await SB.get(`bookings?date=gte.${from}&date=lte.${to}&order=date.asc,time.asc`)||[];}catch(e){}
    const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dLabels=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const firstDow=new Date(y,m,1).getDay(),today=todayStr();
    const byDate={};allBks.forEach(b=>{if(!byDate[b.date])byDate[b.date]=[];byDate[b.date].push(b);});
    const totalDone=allBks.filter(b=>b.status==='done').length;
    const totalRevenue=allBks.filter(b=>b.status==='done').reduce((s,b)=>s+(b.total_price||0),0);
    let cells='';
    for(let i=0;i<firstDow;i++)cells+='<div></div>';
    for(let d=1;d<=lastDay;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayBks=byDate[ds]||[];
      const hasPending=dayBks.some(b=>b.status==='pending'),hasDone=dayBks.some(b=>b.status==='done');
      const isT=ds===today,isSel=ds===S.histSelDate;
      let bg='transparent';if(hasDone)bg='rgba(39,174,96,0.2)';if(hasPending)bg='rgba(201,168,76,0.2)';
      cells+=`<div class="date-cell ${isT?'today':''} ${isSel?'selected':''} ${dayBks.length?'available':''}" style="${dayBks.length?`background:${bg};`:''}position:relative;" onclick="${dayBks.length?`Admin.histShowDay('${ds}')`:''}" >${d}${dayBks.length?`<div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:8px;color:${hasDone?'#27AE60':hasPending?'var(--gold)':'var(--muted)'}">${dayBks.length}</div>`:''}</div>`;
    }
    let dayDetail='';
    if(S.histSelDate&&byDate[S.histSelDate]){
      const bks=byDate[S.histSelDate];
      const df=new Date(S.histSelDate+'T12:00:00').toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
      const sb={pending:'badge-pending',done:'badge-done',cancelled:'badge-cancelled'};
      const sm={pending:'Ожидает',done:'Выполнено',cancelled:'Отменено'};
      dayDetail=`<div class="sec-title">${df}</div>${bks.map(b=>`
        <div class="booking-card ${b.status}" style="opacity:${b.status==='cancelled'?0.5:1}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="booking-time">${b.time.slice(0,5)} · ${b.total_duration} мин</div>
            <span class="badge ${sb[b.status]||'badge-pending'}">${sm[b.status]||b.status}</span>
          </div>
          ${b.barber_name?`<div style="font-size:11px;color:var(--gold-dark);margin-top:2px">✂ ${b.barber_name}</div>`:''}
          <div class="booking-client">${b.client_name||'Клиент'}${b.client_phone?' · '+b.client_phone:''}</div>
          <div class="booking-services">${(b.services||[]).map(s=>s.name).join(', ')}</div>
          <div style="font-size:13px;color:var(--gold);margin-top:4px">${(b.total_price||0).toLocaleString()} ₽</div>
        </div>`).join('')}`;
    }
    c.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <div class="card" style="text-align:center;padding:10px"><div style="font-size:18px;color:var(--gold);font-weight:700">${totalDone}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">выполнено</div></div>
        <div class="card" style="text-align:center;padding:10px"><div style="font-size:18px;color:var(--gold);font-weight:700">${totalRevenue.toLocaleString()} ₽</div><div style="font-size:10px;color:var(--muted);margin-top:2px">выручка</div></div>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="Admin.histPrev()">‹</button>
          <span class="cal-month">${mNames[m]} ${y}</span>
          <button class="cal-nav-btn" onclick="Admin.histNext()">›</button>
        </div>
        <div class="date-grid">${dLabels.map(l=>`<div class="date-label">${l}</div>`).join('')}</div>
        <div class="date-grid">${cells}</div>
      </div>
      ${dayDetail||(allBks.length===0?'<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Нет записей за этот месяц</div></div>':'<div style="text-align:center;color:var(--muted);font-size:13px;padding:10px">Нажми на день для просмотра</div>')}`;
  },
  histShowDay(ds){S.histSelDate=S.histSelDate===ds?null:ds;this.renderHistory();},
  histPrev(){if(S.histM===0){S.histM=11;S.histY--;}else S.histM--;S.histSelDate=null;this.renderHistory();},
  histNext(){if(S.histM===11){S.histM=0;S.histY++;}else S.histM++;S.histSelDate=null;this.renderHistory();},

  async renderScheduleForBarber(barberId, container){
    const c = container || document.getElementById('admin-content');
    await loadAllSched();
    // days_off для этого барбера
    try{const rows=await SB.get(`days_off?barber_id=eq.${barberId}&order=date.asc`)||[];S.daysOff={};rows.forEach(r=>S.daysOff[r.date]=r.id);}catch(e){S.daysOff={};}

    const y=S.schY||new Date().getFullYear(), m=S.schM||new Date().getMonth();
    const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dLabels=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const dNames=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const today=todayStr(), firstDow=new Date(y,m,1).getDay(), lastDay=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDow;i++)cells+='<div></div>';
    for(let d=1;d<=lastDay;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds+'T12:00:00').getDay(), key=`${barberId}_${dow}`;
      const sched=S.schedule[key];
      const past=ds<today, weekOff=!sched||!sched.is_open, dayOff=!!S.daysOff[ds], tod=ds===today;
      let cls='date-cell', style='';
      if(past) cls+=' past'; else if(weekOff) cls+=' off';
      else if(dayOff){cls+=' available';style='background:rgba(192,57,43,0.25);color:#e57a72;border-color:rgba(192,57,43,0.4);';}
      else cls+=' available';
      if(tod) cls+=' today';
      const onclk=(!past&&!weekOff)?`onclick="Admin.toggleDayOff('${ds}',${barberId})"` : '';
      cells+=`<div class="${cls}" style="${style}" ${onclk}>${d}</div>`;
    }
    c.innerHTML=`
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Нажми на день — отметить/снять выходной</div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="Admin.schPrev()">‹</button>
          <span class="cal-month">${mNames[m]} ${y}</span>
          <button class="cal-nav-btn" onclick="Admin.schNext()">›</button>
        </div>
        <div class="date-grid">${dLabels.map(l=>`<div class="date-label">${l}</div>`).join('')}</div>
        <div class="date-grid">${cells}</div>
        ${Object.keys(S.daysOff).length?`
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--bg5)">
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Выходные:</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${Object.keys(S.daysOff).sort().map(ds=>{
                const df=new Date(ds+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
                return `<div style="padding:4px 8px;background:rgba(192,57,43,0.2);color:#e57a72;border-radius:6px;font-size:12px;cursor:pointer" onclick="Admin.toggleDayOff('${ds}',${barberId})">${df} ✕</div>`;
              }).join('')}
            </div>
          </div>`:''}
      </div>
      <div class="sec-title">Рабочие часы</div>
      <div class="card">
        ${[1,2,3,4,5,6,0].map(dow=>{
          const key=`${barberId}_${dow}`;
          const s=S.schedule[key]||{is_open:false,open_time:'09:00:00',close_time:'21:00:00'};
          return `<div class="day-toggle">
            <span class="day-name">${dNames[dow].slice(0,3)}</span>
            <div class="toggle-wrap">
              <div class="toggle ${s.is_open?'on':''}" onclick="Admin.togDay(${dow})" id="tog-${dow}"></div>
              <div class="time-range" id="tr-${dow}" style="${s.is_open?'':'opacity:0.3;pointer-events:none'}">
                <input class="time-input" type="time" value="${s.open_time.slice(0,5)}" id="open-${dow}">
                <span style="color:var(--muted);font-size:12px">–</span>
                <input class="time-input" type="time" value="${s.close_time.slice(0,5)}" id="close-${dow}">
              </div>
            </div>
          </div>`;}).join('')}
      </div>
      <div style="padding-top:10px"><button class="btn btn-gold" onclick="Admin.saveSched(${barberId})">Сохранить</button></div>
      <div class="sec-title">Мои услуги</div>
      <div class="card" id="barber-svcs-card-bp-${barberId}">
        <div class="loader"><div class="spinner"></div></div>
      </div>`;
    Admin.loadBarberSvcsUI(barberId, `barber-svcs-card-bp-${barberId}`);
  },
};

// ── BARBER PANEL ──────────────────────────────
const BarberPanel = {
  async render(){
    await this.renderTab('bookings');
  },
  tab(name, btn){
    document.querySelectorAll('#screen-barber-panel .admin-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    this.renderTab(name);
  },
  async renderTab(name){
    const c=document.getElementById('barber-panel-content');
    c.innerHTML='<div class="loader"><div class="spinner"></div></div>';
    if(name==='bookings') await this.renderBookings();
    if(name==='schedule') await this.renderSchedule();
  },

  async renderBookings(){
    const c=document.getElementById('barber-panel-content');
    if(!S.currentBarber){c.innerHTML='<div class="empty"><div class="empty-text">Ошибка: барбер не найден</div></div>';return;}
    try{
      await Promise.all([loadAllSched(), loadBookings(S.currentBarber.id), loadDaysOff(S.currentBarber.id)]);
      const today=new Date(), weekDates=[];
      for(let i=0;i<7;i++){const d=new Date(today.getFullYear(),today.getMonth(),today.getDate()+i);weekDates.push(localDateStr(d));}
      const bookingMap={};
      S.bookings.filter(b=>b.status!=='cancelled').forEach(b=>{
        if(!bookingMap[b.date])bookingMap[b.date]={};
        const tMin=timeToMin(b.time);
        if(!bookingMap[b.date][tMin])bookingMap[b.date][tMin]=[];
        bookingMap[b.date][tMin].push(b);
      });
      const dayNames=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
      const today_s=todayStr();
      if(!S.barberPanelDate)S.barberPanelDate=today_s;
      const weekHtml=`<div style="display:flex;gap:4px;margin-bottom:12px;overflow-x:auto">
        ${weekDates.map(ds=>{
          const d=new Date(ds+'T12:00:00'),dow=d.getDay(),isT=ds===today_s,isSel=ds===S.barberPanelDate;
          const cnt=S.bookings.filter(b=>b.date===ds&&b.status!=='cancelled').length;
          return `<div onclick="BarberPanel.showDay('${ds}')" style="flex:1;min-width:42px;text-align:center;padding:8px 4px;border-radius:var(--rs);cursor:pointer;background:${isSel?'var(--gold-dim)':isT?'var(--bg4)':'var(--bg3)'};border:1px solid ${isSel?'var(--gold)':isT?'var(--gold-dark)':'var(--bg5)'};transition:all .15s">
            <div style="font-size:10px;color:var(--muted);margin-bottom:2px">${dayNames[dow]}</div>
            <div style="font-size:15px;color:${isT?'var(--gold)':'var(--cream)'};font-weight:${isT?700:400}">${d.getDate()}</div>
            ${cnt>0?`<div style="width:6px;height:6px;border-radius:50%;background:var(--gold);margin:3px auto 0"></div>`:'<div style="height:9px"></div>'}
          </div>`;
        }).join('')}
      </div>`;
      c.innerHTML=weekHtml+Admin.buildDayView(S.barberPanelDate, bookingMap, S.currentBarber.id);
    }catch(e){c.innerHTML='<div class="empty"><div class="empty-text">Ошибка загрузки</div></div>';}
  },
  showDay(ds){S.barberPanelDate=ds;this.renderBookings();},

  async renderSchedule(){
    const c=document.getElementById('barber-panel-content');
    if(!S.currentBarber){c.innerHTML='<div class="empty"><div class="empty-text">Ошибка</div></div>';return;}
    // Устанавливаем выбранного барбера для renderSchedule
    S.schedSelBarber=S.currentBarber.id;
    await loadAllBarbers();
    // Вызываем тот же renderSchedule из Admin но без выбора барбера
    await Admin.renderScheduleForBarber(S.currentBarber.id, c);
  },
};

// ── INIT ──────────────────────────────────────
async function init(){
  await loadSvcs();
  if(TG_USER){
    const isMain=TG_USER.id===CONFIG.ADMIN_TELEGRAM_ID;
    const p=new URLSearchParams(window.location.search);
    const wantsAdmin=p.get('admin')==='1'||TG?.initDataUnsafe?.start_param==='admin';

    if(isMain&&wantsAdmin){Nav.go('admin');return;}

    if(!isMain&&wantsAdmin){
      // Проверяем роль admin
      try{
        const adminRows=await SB.get(`admins?telegram_id=eq.${TG_USER.id}`)||[];
        if(adminRows.length>0){Nav.go('admin');return;}
      }catch(e){}

      // Проверяем роль barber
      try{
        const barberRows=await SB.get(`barbers?telegram_id=eq.${TG_USER.id}&is_active=eq.true`)||[];
        if(barberRows.length>0){
          S.currentBarber=barberRows[0];
          S.barberPanelDate=todayStr();
          document.getElementById('barber-panel-name').textContent=barberRows[0].name;
          Nav.go('barber-panel');
          return;
        }
      }catch(e){}
    }
  }
  Home.render();
}
init();
</script>
