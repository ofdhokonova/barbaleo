<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barbaleo Club</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--gold:#C9A84C;--gold-light:#E2C068;--gold-dark:#8A6A28;--gold-dim:rgba(201,168,76,0.2);--bg:#0D0B09;--bg2:#161310;--bg3:#1E1A14;--bg4:#26211A;--bg5:#302A20;--cream:#F0E6CC;--cream2:#C8B98A;--muted:#6B6050;--danger:#C0392B;--success:#27AE60;--r:10px;--rs:6px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden;font-size:15px}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
.hdr{background:var(--bg2);border-bottom:1px solid var(--gold-dim);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-crown{font-size:18px;line-height:1}
.hdr-name{font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-weight:600}
.hdr-back{background:none;color:var(--gold);font-size:22px;padding:4px 8px 4px 0;line-height:1}
.hdr-title{font-size:14px;color:var(--cream);letter-spacing:1px;flex:1;text-align:center}
.hdr-action{background:none;color:var(--gold);font-size:12px;letter-spacing:1px;padding:4px 0}
.bnav{background:var(--bg2);border-top:1px solid var(--gold-dim);display:flex;position:sticky;bottom:0;z-index:100}
.bnav-btn{flex:1;padding:9px 4px 7px;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
.bnav-btn.active{color:var(--gold)}
.bnav-icon{font-size:19px;line-height:1}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.sec-title{font-size:10px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--gold-dim)}
.sec-title:first-child{margin-top:0}
.card{background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card.gold-border{border-color:var(--gold-dim)}
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);font-size:14px;font-weight:600;letter-spacing:1px;text-align:center;transition:all .15s}
.btn-gold{background:var(--gold);color:#0D0B09}.btn-gold:active{background:var(--gold-light)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}.btn-outline:active{background:var(--gold-dim)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;display:inline-block}
.btn-icon{background:none;color:var(--gold);font-size:18px;padding:6px}
.svc-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg5)}
.svc-item:last-child{border-bottom:none}
.svc-check{width:22px;height:22px;border-radius:4px;border:1.5px solid var(--gold-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer}
.svc-check.checked{background:var(--gold);border-color:var(--gold)}
.svc-check svg{width:13px;height:13px;stroke:#0D0B09;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .15s}
.svc-check.checked svg{opacity:1}
.svc-info{flex:1;cursor:pointer}
.svc-name{font-size:14px;color:var(--cream);line-height:1.3}
.svc-meta{font-size:12px;color:var(--muted);margin-top:2px}
.svc-price{font-size:14px;color:var(--gold);font-weight:600;flex-shrink:0}
.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.date-label{font-size:10px;text-align:center;color:var(--muted);padding:4px 0;letter-spacing:0.5px}
.date-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.date-cell.today{border-color:var(--gold-dark);color:var(--gold)}
.date-cell.selected{background:var(--gold);color:#0D0B09;font-weight:700}
.date-cell.past{color:var(--muted);pointer-events:none;opacity:0.4}
.date-cell.off{color:var(--muted);pointer-events:none;opacity:0.3}
.date-cell.available:not(.selected):hover{background:var(--bg4)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav-btn{background:none;color:var(--gold);font-size:22px;padding:4px 12px}
.cal-month{font-size:14px;letter-spacing:1px;color:var(--cream)}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.time-slot{padding:10px 4px;text-align:center;border-radius:var(--rs);border:1px solid var(--bg5);font-size:13px;cursor:pointer;transition:all .15s;color:var(--cream2)}
.time-slot.selected{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);font-weight:600}
.time-slot.busy{background:var(--bg4);color:var(--muted);pointer-events:none;text-decoration:line-through;opacity:0.6}
.time-slot.free:not(.selected):hover{border-color:var(--gold-dark)}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg5)}
.summary-row:last-child{border-bottom:none}
.summary-row.total{border-top:1px solid var(--gold-dim);margin-top:6px;padding-top:12px}
.summary-label{font-size:13px;color:var(--muted)}
.summary-val{font-size:13px;color:var(--cream)}
.summary-val.gold{color:var(--gold);font-weight:700;font-size:15px}
.booking-card{background:var(--bg3);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;margin-bottom:8px}
.booking-card.done{border-left-color:var(--success)}
.booking-card.cancelled{border-left-color:var(--danger);opacity:0.6}
.booking-time{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:4px}
.booking-client{font-size:14px;color:var(--cream)}
.booking-services{font-size:12px;color:var(--muted);margin-top:3px}
.booking-actions{display:flex;gap:8px;margin-top:10px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--rs);padding:11px 13px;color:var(--cream);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.badge-pending{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-done{background:rgba(39,174,96,0.15);color:#27AE60}
.badge-cancelled{background:rgba(192,57,43,0.15);color:#C0392B}
.badge-admin{background:rgba(201,168,76,0.2);color:var(--gold)}
.badge-client{background:rgba(107,96,80,0.2);color:var(--muted)}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:18px;text-align:center;color:var(--cream);margin-bottom:4px}
.profile-sub{font-size:12px;text-align:center;color:var(--muted);margin-bottom:20px}
.hist-item{background:var(--bg3);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;border:1px solid var(--bg5)}
.hist-date{font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hist-services{font-size:13px;color:var(--cream);margin-bottom:4px}
.hist-price{font-size:13px;color:var(--gold);font-weight:600}
.day-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bg5)}
.day-toggle:last-child{border-bottom:none}
.day-name{font-size:14px;color:var(--cream);width:60px}
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{width:42px;height:24px;background:var(--bg5);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:var(--bg);border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}
.time-range{display:flex;align-items:center;gap:6px}
.time-input{width:72px;background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--rs);padding:6px 8px;color:var(--cream);text-align:center;font-size:13px;outline:none}
.time-input:focus{border-color:var(--gold)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5}
.empty-text{font-size:14px;line-height:1.5}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 32px;width:100%;max-height:85vh;overflow-y:auto;border-top:1px solid var(--gold-dim)}
.modal-title{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;text-align:center}
.step-bar{display:flex;gap:4px;padding:12px 16px 0}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--bg5)}
.step-dot.done{background:var(--gold)}
.step-dot.active{background:var(--gold-light)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold-dim);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--cream);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loader{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--bg5);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.admin-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--gold-dim);overflow-x:auto}
.admin-tab{flex-shrink:0;padding:11px 12px;background:none;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.client-card{background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.client-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg4);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">

<div id="screen-home" class="screen active">
  <div class="hdr">
    <div class="hdr-logo"><span class="hdr-crown">♛</span><span class="hdr-name">Barbaleo</span></div>
    <button class="hdr-action" onclick="Nav.go('profile')">Профиль</button>
  </div>
  <div class="content" id="home-content"><div class="loader"><div class="spinner"></div></div></div>
  <div class="bnav">
    <button class="bnav-btn active" onclick="Nav.go('home')"><span class="bnav-icon">✂</span>Запись</button>
    <button class="bnav-btn" onclick="Nav.go('profile')"><span class="bnav-icon">◉</span>Профиль</button>
  </div>
</div>

<div id="screen-services" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="Nav.go('home')">‹</button>
    <span class="hdr-title">Выбор услуг</span>
    <span style="width:40px"></span>
  </div>
  <div class="step-bar"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div></div>
  <div class="content" id="services-content"></div>
  <div style="padding:12px 16px;background:var(--bg)">
    <div id="svc-summary" style="display:none" class="card gold-border">
      <div class="summary-row total">
        <span class="summary-label">Итого</span>
        <span class="summary-val gold" id="svc-total-price">0 ₽</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px" id="svc-total-dur"></div>
    </div>
    <button class="btn btn-gold" onclick="Booking.nextToDate()" id="btn-next-date" disabled style="opacity:0.4">Выбрать дату →</button>
  </div>
</div>

<div id="screen-datetime" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="Nav.go('services')">‹</button>
    <span class="hdr-title">Дата и время</span>
    <span style="width:40px"></span>
  </div>
  <div class="step-bar"><div class="step-dot done"></div><div class="step-dot active"></div><div class="step-dot"></div></div>
  <div class="content" id="datetime-content"></div>
  <div style="padding:12px 16px;background:var(--bg)">
    <button class="btn btn-gold" onclick="Booking.nextToConfirm()" id="btn-next-confirm" disabled style="opacity:0.4">Далее →</button>
  </div>
</div>

<div id="screen-confirm" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="Nav.go('datetime')">‹</button>
    <span class="hdr-title">Подтверждение</span>
    <span style="width:40px"></span>
  </div>
  <div class="step-bar"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot active"></div></div>
  <div class="content" id="confirm-content"></div>
</div>

<div id="screen-profile" class="screen">
  <div class="hdr">
    <div class="hdr-logo"><span class="hdr-crown">♛</span><span class="hdr-name">Barbaleo</span></div>
    <span style="width:60px"></span>
  </div>
  <div class="content" id="profile-content"><div class="loader"><div class="spinner"></div></div></div>
  <div class="bnav">
    <button class="bnav-btn" onclick="Nav.go('home')"><span class="bnav-icon">✂</span>Запись</button>
    <button class="bnav-btn active" onclick="Nav.go('profile')"><span class="bnav-icon">◉</span>Профиль</button>
  </div>
</div>

<div id="screen-admin" class="screen">
  <div class="hdr">
    <div class="hdr-logo"><span class="hdr-crown">♛</span><span class="hdr-name">Админка</span></div>
    <button class="hdr-action" onclick="Nav.go('home')">Выход</button>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="Admin.tab('bookings',this)">Записи</button>
    <button class="admin-tab" onclick="Admin.tab('services',this)">Услуги</button>
    <button class="admin-tab" onclick="Admin.tab('schedule',this)">График</button>
    <button class="admin-tab" onclick="Admin.tab('clients',this)">Клиенты</button>
  </div>
  <div class="content" id="admin-content"><div class="loader"><div class="spinner"></div></div></div>
</div>

<div class="modal-overlay hidden" id="modal-service">
  <div class="modal">
    <div class="modal-title" id="modal-svc-title">Новая услуга</div>
    <input type="hidden" id="svc-edit-id">
    <div class="field"><label>Название</label><input id="svc-name" type="text" placeholder="Мужская стрижка"></div>
    <div class="field-row">
      <div class="field"><label>Цена (₽)</label><input id="svc-price" type="number" placeholder="1200"></div>
      <div class="field"><label>Длительность (мин)</label><input id="svc-duration" type="number" placeholder="60"></div>
    </div>
    <div class="field"><label>Описание (опц.)</label><input id="svc-desc" type="text" placeholder="Краткое описание"></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-outline" style="flex:1;padding:12px" onclick="Modal.close('modal-service')">Отмена</button>
      <button class="btn btn-gold" style="flex:1;padding:12px" onclick="Admin.saveService()">Сохранить</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-manual">
  <div class="modal" style="max-height:92vh">
    <div class="modal-title">Ручная запись</div>

    <!-- ШАГ 1: имя + телефон -->
    <div id="manual-step1">
      <div class="field"><label>Имя клиента *</label><input id="m-name" type="text" placeholder="Имя клиента" autocomplete="name"></div>
      <div class="field"><label>Телефон *</label><input id="m-phone" type="tel" placeholder="+7 900 000-00-00" autocomplete="tel"></div>
      <button class="btn btn-gold" style="margin-top:4px" onclick="Admin.manualStep2()">Далее → Выбор услуг</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="Modal.close('modal-manual')">Отмена</button>
    </div>

    <!-- ШАГ 2: услуги -->
    <div id="manual-step2" style="display:none">
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Выберите услуги</div>
      <div id="m-svc-list"></div>
      <div id="m-svc-summary" style="display:none;margin-top:10px;padding:10px;background:var(--bg4);border-radius:var(--rs)">
        <div style="display:flex;justify-content:space-between">
          <span style="font-size:13px;color:var(--muted)">Итого</span>
          <span style="font-size:13px;color:var(--gold);font-weight:600" id="m-svc-total">0 ₽</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="m-svc-dur"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-outline" style="flex:1;padding:12px" onclick="Admin.manualBack(1)">‹ Назад</button>
        <button class="btn btn-gold" style="flex:1;padding:12px" id="m-btn-step3" disabled style="opacity:0.4" onclick="Admin.manualStep3()">Выбрать дату →</button>
      </div>
    </div>

    <!-- ШАГ 3: дата + время -->
    <div id="manual-step3" style="display:none">
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Выберите дату и время</div>
      <div id="m-cal"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-outline" style="flex:1;padding:12px" onclick="Admin.manualBack(2)">‹ Назад</button>
        <button class="btn btn-gold" style="flex:1;padding:12px" id="m-btn-save" disabled style="opacity:0.4" onclick="Admin.saveManual()">Записать</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  SUPABASE_URL: 'https://gjqbqfufsdondlbcblpa.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqcWJxZnVmc2RvbmRsYmNibHBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mzc2MzAsImV4cCI6MjA4OTAxMzYzMH0.83SKDlG5VqsGNaVbw164EYjYzWzYWdRj5TWX9VyAm_c',
  ADMIN_TELEGRAM_ID: 955233482,
  BOT_URL: 'https://barbaleo.onrender.com',
};

const SB = {
  async req(method, path, body) {
    const r = await fetch(CONFIG.SUPABASE_URL + '/rest/v1/' + path, {
      method,
      headers: { 'apikey': CONFIG.SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + CONFIG.SUPABASE_ANON_KEY, 'Content-Type': 'application/json', 'Prefer': method === 'POST' ? 'return=representation' : '' },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) throw new Error(await r.text());
    const t = await r.text(); return t ? JSON.parse(t) : null;
  },
  get: (p) => SB.req('GET', p),
  post: (p, b) => SB.req('POST', p, b),
  patch: (p, b) => SB.req('PATCH', p, b),
  delete: (p) => SB.req('DELETE', p),
};

const TG = window.Telegram?.WebApp;
if (TG) { TG.expand(); TG.setHeaderColor('#0D0B09'); TG.setBackgroundColor('#0D0B09'); }
const TG_USER = TG?.initDataUnsafe?.user || null;

const S = {
  services: [], schedule: {}, daysOff: {}, bookings: [],
  selSvcs: [], selDate: null, selTime: null,
  calY: new Date().getFullYear(), calM: new Date().getMonth(),
  schY: new Date().getFullYear(), schM: new Date().getMonth(),
  adminTab: 'bookings', adminSelDate: null,
  manualSelSvcs: [], manualSelDate: null, manualSelTime: null,
  manualCalY: new Date().getFullYear(), manualCalM: new Date().getMonth(),
};

// ── UTILS ─────────────────────────────────────
function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
const Modal = { open: id => document.getElementById(id).classList.remove('hidden'), close: id => document.getElementById(id).classList.add('hidden') };

// localDateStr — YYYY-MM-DD в локальном времени (исправляет баг с UTC)
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr() { return localDateStr(new Date()); }

// Разбираем время "HH:MM:SS" или "HH:MM" в минуты
function timeToMin(t) { const p = t.split(':'); return parseInt(p[0])*60 + parseInt(p[1]); }

// isOff — день закрыт (по расписанию недели или по разовому выходному)
function isOff(dateStr) {
  const dow = new Date(dateStr + 'T12:00:00').getDay();
  const sched = S.schedule[dow];
  return !sched || !sched.is_open || !!S.daysOff[dateStr];
}

// getBusy — Set занятых стартовых слотов (каждые 30 мин) для конкретной даты
function getBusy(dateStr) {
  const busy = new Set();
  S.bookings.filter(b => b.date === dateStr && b.status !== 'cancelled').forEach(b => {
    const start = timeToMin(b.time);
    const dur = b.total_duration || 30;
    // Блокируем каждый 30-минутный слот который попадает в диапазон записи
    // Слот t заблокирован если start <= t < start+dur
    for (let t = start; t < start + dur; t += 30) busy.add(t);
  });
  return busy;
}

async function loadSvcs(all=false) {
  const q = all ? 'services?order=sort_order.asc,name.asc' : 'services?order=sort_order.asc,name.asc&is_active=eq.true';
  S.services = await SB.get(q) || [];
}
async function loadSched() {
  const rows = await SB.get('schedule') || []; S.schedule = {};
  rows.forEach(r => S.schedule[r.day_of_week] = r);
}
async function loadBookings() {
  S.bookings = await SB.get(`bookings?date=gte.${todayStr()}&order=date.asc,time.asc`) || [];
}
async function loadDaysOff() {
  const rows = await SB.get(`days_off?date=gte.${todayStr()}`) || []; S.daysOff = {};
  rows.forEach(r => S.daysOff[r.date] = r.id);
}

const DateTime = {
  async render() {
    const c = document.getElementById('datetime-content');
    c.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    await Promise.all([loadSched(), loadBookings(), loadDaysOff()]);
    this.renderCal();
  },
  renderCal() {
    const c = document.getElementById('datetime-content');
    const y=S.calY, m=S.calM;
    const monthNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dayLabels=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const today=todayStr();
    const firstDow=new Date(y,m,1).getDay();
    const lastDay=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDow;i++) cells+='<div></div>';
    for(let d=1;d<=lastDay;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const past=ds<today, off=isOff(ds), sel=ds===S.selDate, tod=ds===today;
      let cls='date-cell';
      if(past) cls+=' past';
      else if(off) cls+=' off';
      else cls+=' available';
      if(tod&&!past) cls+=' today';
      if(sel) cls+=' selected';
      cells+=`<div class="${cls}" ${(!past&&!off)?`onclick="DateTime.pickDate('${ds}')"`:''} >${d}</div>`;
    }
    c.innerHTML=`
      <div class="sec-title">Выберите дату</div>
      <div class="card">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="DateTime.prevM()">‹</button>
          <div class="cal-month">${monthNames[m]} ${y}</div>
          <button class="cal-nav-btn" onclick="DateTime.nextM()">›</button>
        </div>
        <div class="date-grid">${dayLabels.map(l=>`<div class="date-label">${l}</div>`).join('')}</div>
        <div class="date-grid">${cells}</div>
      </div>
      ${S.selDate?`<div class="sec-title">Выберите время</div><div class="card">${this.renderSlots(S.selDate)}</div>`:''}`;
    const btn=document.getElementById('btn-next-confirm');
    btn.disabled=!(S.selDate&&S.selTime); btn.style.opacity=(S.selDate&&S.selTime)?1:0.4;
  },
  renderSlots(dateStr) {
    const dow=new Date(dateStr+'T12:00:00').getDay();
    const sched=S.schedule[dow];
    if(!sched||!sched.is_open) return '<div style="color:var(--muted);font-size:13px">Выходной день</div>';
    const dur=Booking.totalDur()||30;
    const openMin=timeToMin(sched.open_time);
    const closeMin=timeToMin(sched.close_time);
    const busy=getBusy(dateStr);
    const slots=[];
    for(let t=openMin;t+dur<=closeMin;t+=30){
      // Слот занят если хоть один 30-мин блок из диапазона [t, t+dur) уже занят
      let isBusy=false;
      for(let bl=t;bl<t+dur;bl+=30){if(busy.has(bl)){isBusy=true;break;}}
      const hh=String(Math.floor(t/60)).padStart(2,'0'), mm=String(t%60).padStart(2,'0');
      slots.push({ts:`${hh}:${mm}`,busy:isBusy});
    }
    if(!slots.length) return '<div style="color:var(--muted);font-size:13px">Нет доступных слотов</div>';
    return `<div class="time-grid">${slots.map(s=>`
      <div class="time-slot ${s.busy?'busy':'free'} ${S.selTime===s.ts?'selected':''}" onclick="${s.busy?'':` DateTime.pickTime('${s.ts}')`}">${s.ts}</div>`).join('')}</div>`;
  },
  pickDate(ds) { S.selDate=ds; S.selTime=null; document.getElementById('btn-next-confirm').disabled=true; document.getElementById('btn-next-confirm').style.opacity=0.4; this.renderCal(); },
  pickTime(t) { S.selTime=t; document.getElementById('btn-next-confirm').disabled=false; document.getElementById('btn-next-confirm').style.opacity=1; this.renderCal(); },
  prevM() { if(S.calM===0){S.calM=11;S.calY--;}else S.calM--; this.renderCal(); },
  nextM() { if(S.calM===11){S.calM=0;S.calY++;}else S.calM++; this.renderCal(); },
};

const Admin = {
  async render() { await this.renderTab(S.adminTab||'bookings'); },
  tab(name,btn) {
    document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active'); S.adminTab=name; this.renderTab(name);
  },

    const c=document.getElementById('admin-content');
    c.innerHTML='<div class="loader"><div class="spinner"></div></div>';
    if(name==='bookings') await this.renderBookings();
    if(name==='services') await this.renderServices();
    if(name==='schedule') await this.renderSchedule();
    if(name==='clients') await this.renderClients();
  },

  // ЗАПИСИ
  async renderBookings() {
    const c=document.getElementById('admin-content');
    try {
      await Promise.all([loadBookings(), loadSched(), loadDaysOff()]);

      // Неделя начиная с сегодня
      const today = new Date();
      const weekDates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
        weekDates.push(localDateStr(d));
      }

      // Рабочие часы (берём из расписания — начало и конец дня)
      const allScheds = Object.values(S.schedule).filter(s => s.is_open);
      const globalOpen = allScheds.length ? Math.min(...allScheds.map(s => timeToMin(s.open_time))) : 9*60;
      const globalClose = allScheds.length ? Math.max(...allScheds.map(s => timeToMin(s.close_time))) : 21*60;

      // Временные слоты с шагом 30 мин
      const timeSlots = [];
      for (let t = globalOpen; t < globalClose; t += 30) {
        timeSlots.push(t);
      }

      // Группируем записи по дате и времени
      const bookingMap = {}; // dateStr -> timeMin -> booking
      S.bookings.forEach(b => {
        if (!bookingMap[b.date]) bookingMap[b.date] = {};
        const tMin = timeToMin(b.time);
        bookingMap[b.date][tMin] = b;
      });

      const dayNames = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
      const today_s = todayStr();

      // Строим HTML недели
      let weekHtml = `
        <div style="display:flex;gap:4px;margin-bottom:16px;overflow-x:auto">
          ${weekDates.map(ds => {
            const d = new Date(ds+'T12:00:00');
            const dow = d.getDay();
            const isToday = ds === today_s;
            const off = isOff(ds);
            const dayBookings = S.bookings.filter(b => b.date === ds && b.status !== 'cancelled');
            const cnt = dayBookings.length;
            return `
              <div onclick="Admin.showDayDetail('${ds}')" style="flex:1;min-width:42px;text-align:center;padding:8px 4px;border-radius:var(--rs);cursor:pointer;background:${isToday?'var(--gold-dim)':'var(--bg3)'};border:1px solid ${isToday?'var(--gold)':'var(--bg5)'};transition:all .15s">
                <div style="font-size:10px;color:var(--muted);margin-bottom:2px">${dayNames[dow]}</div>
                <div style="font-size:15px;color:${isToday?'var(--gold)':off?'var(--muted)':'var(--cream)'};font-weight:${isToday?700:400}">${d.getDate()}</div>
                ${cnt > 0 ? `<div style="width:6px;height:6px;border-radius:50%;background:var(--gold);margin:3px auto 0"></div>` : '<div style="height:9px"></div>'}
              </div>`;
          }).join('')}
        </div>`;

      // Детальный вид выбранного дня (по умолчанию сегодня)
      if (!S.adminSelDate) S.adminSelDate = today_s;
      weekHtml += this.buildDayView(S.adminSelDate, timeSlots, bookingMap);

      c.innerHTML = `
        <button class="btn btn-outline" style="margin-bottom:12px" onclick="Admin.openManual()">+ Ручная запись</button>
        ${weekHtml}`;

    } catch(e) { document.getElementById('admin-content').innerHTML='<div class="empty"><div class="empty-text">Ошибка</div></div>'; }
  },

  buildDayView(dateStr, timeSlots, bookingMap) {
    const d = new Date(dateStr+'T12:00:00');
    const dow = d.getDay();
    const sched = S.schedule[dow];
    const df = d.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
    const off = isOff(dateStr);
    const dayMap = bookingMap[dateStr] || {};
    const sb={pending:'badge-pending',done:'badge-done',cancelled:'badge-cancelled'};
    const sm={pending:'Ожидает',done:'Готово',cancelled:'Отменено'};

    if (off) return `<div class="sec-title">${df}</div><div class="card"><div style="text-align:center;color:var(--muted);padding:16px">Выходной день</div></div>`;

    const openMin = sched ? timeToMin(sched.open_time) : 9*60;
    const closeMin = sched ? timeToMin(sched.close_time) : 21*60;

    // Строим сетку слотов
    let slotsHtml = '';
    const usedBookings = new Set(); // чтобы не дублировать карточки

    for (let t = openMin; t < closeMin; t += 30) {
      const hh = String(Math.floor(t/60)).padStart(2,'0');
      const mm = String(t%60).padStart(2,'0');
      const timeStr = `${hh}:${mm}`;
      const bk = dayMap[t];

      if (bk && !usedBookings.has(bk.id)) {
        usedBookings.add(bk.id);
        const svcs = (bk.services||[]).map(s=>s.name).join(', ');
        const blocks = Math.ceil((bk.total_duration||30)/30);
        slotsHtml += `
          <div style="display:flex;gap:8px;margin-bottom:6px;align-items:flex-start">
            <div style="font-size:12px;color:var(--gold);width:38px;flex-shrink:0;padding-top:10px;font-weight:600">${timeStr}</div>
            <div class="booking-card ${bk.status}" style="flex:1;margin-bottom:0;cursor:pointer" onclick="Admin.toggleBookingDetail(${bk.id})">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="booking-time" style="margin-bottom:0">${bk.time.slice(0,5)} · ${bk.total_duration} мин</div>
                <span class="badge ${sb[bk.status]||'badge-pending'}">${sm[bk.status]||bk.status}</span>
              </div>
              <div class="booking-client" style="margin-top:4px">${bk.client_name||'Клиент'}${bk.client_phone?' · '+bk.client_phone:''}</div>
              <div id="bk-detail-${bk.id}" style="display:none">
                <div class="booking-services" style="margin-top:4px">${svcs}</div>
                <div style="font-size:13px;color:var(--gold);margin-top:4px">${(bk.total_price||0).toLocaleString()} ₽</div>
                ${bk.status==='pending'?`
                  <div class="booking-actions">
                    <button class="btn btn-sm" style="background:rgba(39,174,96,0.15);color:#27AE60;border:1px solid rgba(39,174,96,0.3);border-radius:6px;flex:1" onclick="event.stopPropagation();Admin.setStatus(${bk.id},'done')">✓ Выполнено</button>
                    <button class="btn btn-sm" style="background:rgba(192,57,43,0.15);color:#C0392B;border:1px solid rgba(192,57,43,0.3);border-radius:6px;flex:1" onclick="event.stopPropagation();Admin.setStatus(${bk.id},'cancelled')">✕ Отменить</button>
                  </div>`:''}
              </div>
            </div>
          </div>`;
        // Пропускаем занятые блоки
        t += (blocks - 1) * 30;
      } else if (!bk) {
        slotsHtml += `
          <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
            <div style="font-size:12px;color:var(--muted);width:38px;flex-shrink:0">${timeStr}</div>
            <div style="flex:1;height:32px;border:1px dashed var(--bg5);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--bg5);transition:all .15s" onmouseover="this.style.borderColor='var(--gold-dark)';this.style.color='var(--muted)'" onmouseout="this.style.borderColor='var(--bg5)';this.style.color='var(--bg5)'" onclick="Admin.openManualAt('${dateStr}','${timeStr}')">свободно</div>
          </div>`;
      }
    }

    return `
      <div class="sec-title">${df}</div>
      <div style="background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:12px">
        ${slotsHtml || '<div style="text-align:center;color:var(--muted);padding:16px;font-size:13px">Нет записей</div>'}
      </div>`;
  },

    this.renderBookings();
  },

  manualStep2() {
    const name = document.getElementById('m-name').value.trim();
    const phone = document.getElementById('m-phone').value.trim();
    if (!name) { showToast('Введите имя'); return; }

      </div>`).join('');
    const btn = document.getElementById('m-btn-step3');

    const i = S.manualSelSvcs.indexOf(id);
    if (i===-1) S.manualSelSvcs.push(id); else S.manualSelSvcs.splice(i,1);
    S.services.forEach(s => {

      const dur = S.manualSelSvcs.reduce((sum,id)=>{const s=S.services.find(v=>v.id===id);return sum+(s?s.duration_minutes:0);},0);
      document.getElementById('m-svc-total').textContent = price.toLocaleString()+' ₽';
      document.getElementById('m-svc-dur').textContent = '~'+dur+' мин';
      document.getElementById('m-svc-summary').style.display = 'block';
      btn.disabled = false; btn.style.opacity = 1;
    } else {
      document.getElementById('m-svc-summary').style.display = 'none';
      btn.disabled = true; btn.style.opacity = 0.4;
    }
  },

  manualStep3() {
    document.getElementById('manual-step2').style.display = 'none';
    document.getElementById('manual-step3').style.display = 'block';
    const btn = document.getElementById('m-btn-save');
    btn.disabled = !(S.manualSelDate && S.manualSelTime);
    btn.style.opacity = (S.manualSelDate && S.manualSelTime) ? 1 : 0.4;
    this.renderManualCal();
  },

  renderManualCal() {
    const cal = document.getElementById('m-cal'); if (!cal) return;
    const y=S.manualCalY, m=S.manualCalM;
    const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dLabels=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const today=todayStr(), firstDow=new Date(y,m,1).getDay(), lastDay=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDow;i++) cells+='<div></div>';
    for(let d=1;d<=lastDay;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const past=ds<today, off=isOff(ds), sel=ds===S.manualSelDate, tod=ds===today;
      let cls='date-cell';
      if(past) cls+=' past'; else if(off) cls+=' off'; else cls+=' available';
      if(tod&&!past) cls+=' today'; if(sel) cls+=' selected';
      cells+=`<div class="${cls}" ${(!past&&!off)?`onclick="Admin.manualPickDate('${ds}')"`:''} >${d}</div>`;
    }
    let slotsHtml='';
    if (S.manualSelDate) {
      const dow=new Date(S.manualSelDate+'T12:00:00').getDay(), sched=S.schedule[dow];
      if (sched&&sched.is_open) {
        const dur=S.manualSelSvcs.reduce((sum,id)=>{const s=S.services.find(v=>v.id===id);return sum+(s?s.duration_minutes:0);},0)||30;
        const openMin=timeToMin(sched.open_time), closeMin=timeToMin(sched.close_time);
        const busy=getBusy(S.manualSelDate);
        const slots=[];
        for(let t=openMin;t+dur<=closeMin;t+=30){
          let isBusy=false;
          for(let bl=t;bl<t+dur;bl+=30){if(busy.has(bl)){isBusy=true;break;}}
          const hh=String(Math.floor(t/60)).padStart(2,'0'),mm=String(t%60).padStart(2,'0');
          slots.push({ts:`${hh}:${mm}`,busy:isBusy});
        }
        slotsHtml=`<div style="font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--gold-dim)">Выберите время</div>
          <div class="time-grid">${slots.map(s=>`<div class="time-slot ${s.busy?'busy':'free'} ${S.manualSelTime===s.ts?'selected':''}" onclick="${s.busy?'':` Admin.manualPickTime('${s.ts}')`}">${s.ts}</div>`).join('')}</div>`;
      }
    }
    cal.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <button class="cal-nav-btn" onclick="Admin.manualPrevM()">‹</button>
        <span style="font-size:14px;color:var(--cream)">${mNames[m]} ${y}</span>
        <button class="cal-nav-btn" onclick="Admin.manualNextM()">›</button>
      </div>
      <div class="date-grid">${dLabels.map(l=>`<div class="date-label">${l}</div>`).join('')}</div>
      <div class="date-grid">${cells}</div>${slotsHtml}`;
  },

  manualPickDate(ds) {
    S.manualSelDate=ds; S.manualSelTime=null;
    document.getElementById('m-btn-save').disabled=true;
    document.getElementById('m-btn-save').style.opacity=0.4;
    this.renderManualCal();
  },
  manualPickTime(t) {
    S.manualSelTime=t;
    document.getElementById('m-btn-save').disabled=false;
    document.getElementById('m-btn-save').style.opacity=1;
    this.renderManualCal();
  },
  manualPrevM(){if(S.manualCalM===0){S.manualCalM=11;S.manualCalY--;}else S.manualCalM--;this.renderManualCal();},
  manualNextM(){if(S.manualCalM===11){S.manualCalM=0;S.manualCalY++;}else S.manualCalM++;this.renderManualCal();},
  manualBack(toStep){
    document.getElementById('manual-step1').style.display=toStep===1?'block':'none';
    document.getElementById('manual-step2').style.display=toStep===2?'block':'none';
    document.getElementById('manual-step3').style.display='none';
  },

  async saveManual() {
    const name=document.getElementById('m-name').value.trim();
    const phone=document.getElementById('m-phone').value.trim();
    if(!name||!S.manualSelDate||!S.manualSelTime||!S.manualSelSvcs.length){showToast('Заполните все данные');return;}
    const svcs=S.manualSelSvcs.map(id=>{const s=S.services.find(v=>v.id===id);return{id,name:s.name,price:s.price,duration:s.duration_minutes};});
    try{
      await SB.post('bookings',{date:S.manualSelDate,time:S.manualSelTime+':00',services:svcs,total_price:svcs.reduce((s,x)=>s+x.price,0),total_duration:svcs.reduce((s,x)=>s+x.duration,0),client_name:name,client_phone:phone||null,client_telegram_id:null,reminder_sent:false,status:'pending'});
      Modal.close('modal-manual');showToast('Запись добавлена ✓');
      S.adminSelDate=S.manualSelDate;this.renderBookings();
    }catch(e){showToast('Ошибка сохранения');}
  },

    await loadSvcs(true);
    c.innerHTML=`
      <button class="btn btn-outline" style="margin-bottom:12px" onclick="Admin.openSvc()">+ Добавить услугу</button>

      <div id="svc-list">

            <div style="color:var(--muted);font-size:18px;cursor:grab;padding:4px;flex-shrink:0;user-select:none">☰</div>
            <div style="flex:1;min-width:0">

              <button class="btn-icon" style="font-size:12px;padding:2px 5px;color:${i===S.services.length-1?'var(--bg5)':'var(--gold)'}" onclick="Admin.moveSvc(${i},1)" ${i===S.services.length-1?'disabled':''}>▼</button>
            </div>

            <button class="btn-icon" onclick="Admin.toggleActive(${s.id},${s.is_active})" style="color:${s.is_active?'var(--gold)':'var(--muted)'}">${s.is_active?'◉':'○'}</button>
            <button class="btn-icon" style="color:var(--danger)" onclick="Admin.deleteSvc(${s.id},'${s.name.replace(/'/g,"\\'")}')">🗑</button>
          </div>`).join('')}
      </div>`;
    this.initDrag();
  },
  initDrag() {
    const list=document.getElementById('svc-list'); if(!list)return;
    let drag=null;
    list.querySelectorAll('.svc-sort-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{drag=item;setTimeout(()=>item.style.opacity='0.4',0);e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.style.opacity='1';list.querySelectorAll('.svc-sort-item').forEach(i=>i.style.borderTopColor='');if(drag)Admin.saveDragOrder();drag=null;});
      item.addEventListener('dragover',e=>{
        e.preventDefault();if(!drag||item===drag)return;
        list.querySelectorAll('.svc-sort-item').forEach(i=>i.style.borderTopColor='');
        item.style.borderTopColor='var(--gold)';
        const items=[...list.querySelectorAll('.svc-sort-item')];
        if(items.indexOf(drag)<items.indexOf(item))item.after(drag);else item.before(drag);
      });
    });
  },
  async saveDragOrder() {
    const items=[...document.querySelectorAll('.svc-sort-item')];
    try{for(let i=0;i<items.length;i++)await SB.patch(`services?id=eq.${items[i].dataset.id}`,{sort_order:i+1});showToast('Порядок сохранён ✓');}
    catch(e){showToast('Ошибка');}
  },
  async moveSvc(idx,dir) {
    const ni=idx+dir; if(ni<0||ni>=S.services.length)return;
    [S.services[idx],S.services[ni]]=[S.services[ni],S.services[idx]];
    try{await SB.patch(`services?id=eq.${S.services[idx].id}`,{sort_order:idx+1});await SB.patch(`services?id=eq.${S.services[ni].id}`,{sort_order:ni+1});this.renderServices();}
    catch(e){showToast('Ошибка');this.renderServices();}
  },

    const s=id?S.services.find(x=>x.id===id):null;
    document.getElementById('modal-svc-title').textContent=s?'Редактировать':'Новая услуга';
    document.getElementById('svc-edit-id').value=s?s.id:'';
    document.getElementById('svc-name').value=s?s.name:'';
    document.getElementById('svc-price').value=s?s.price:'';
    document.getElementById('svc-duration').value=s?s.duration_minutes:'';
    document.getElementById('svc-desc').value=s?(s.description||''):'';
    Modal.open('modal-service');

  async saveService() {
    const id=document.getElementById('svc-edit-id').value;
    const name=document.getElementById('svc-name').value.trim();
    const price=parseInt(document.getElementById('svc-price').value);
    const dur=parseInt(document.getElementById('svc-duration').value);

  async toggleActive(id,cur){try{await SB.patch(`services?id=eq.${id}`,{is_active:!cur});this.renderServices();}catch(e){showToast('Ошибка');}},
  async deleteSvc(id,name){if(!confirm(`Удалить "${name}"?`))return;try{await SB.delete(`services?id=eq.${id}`);showToast('Удалено');this.renderServices();}catch(e){showToast('Ошибка');}},

  // ГРАФИК
  async renderSchedule() {
    const c=document.getElementById('admin-content');
    await Promise.all([loadSched()]);
    try{const rows=await SB.get('days_off?order=date.asc')||[];S.daysOff={};rows.forEach(r=>S.daysOff[r.date]=r.id);}catch(e){}
    const y=S.schY,m=S.schM;
    const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const dLabels=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const dNames=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const today=todayStr();
    const firstDow=new Date(y,m,1).getDay();
    const lastDay=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDow;i++)cells+='<div></div>';
    for(let d=1;d<=lastDay;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds+'T12:00:00').getDay();
      const sched=S.schedule[dow];
      const past=ds<today, weekOff=!sched||!sched.is_open, dayOff=!!S.daysOff[ds], tod=ds===today;
      let cls='date-cell', style='';
      if(past) cls+=' past';
      else if(weekOff) cls+=' off';
      else if(dayOff){cls+=' available';style='background:rgba(192,57,43,0.25);color:#e57a72;border-color:rgba(192,57,43,0.4);';}
      else cls+=' available';
      if(tod) cls+=' today';
      cells+=`<div class="${cls}" style="${style}" ${(!past&&!weekOff)?`onclick="Admin.toggleDayOff('${ds}')"`:''} >${d}</div>`;
    }
    c.innerHTML=`
      <div class="sec-title">Выходные дни</div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Нажми на день — отметить/снять выходной</div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="Admin.schPrev()">‹</button>
          <div class="cal-month">${mNames[m]} ${y}</div>
          <button class="cal-nav-btn" onclick="Admin.schNext()">›</button>
        </div>
        <div class="date-grid">${dLabels.map(l=>`<div class="date-label">${l}</div>`).join('')}</div>
        <div class="date-grid">${cells}</div>
        ${Object.keys(S.daysOff).length?`
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--bg5)">
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Выходные:</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${Object.keys(S.daysOff).sort().map(ds=>{
                const df=new Date(ds+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
                return `<div style="padding:4px 8px;background:rgba(192,57,43,0.2);color:#e57a72;border-radius:6px;font-size:12px;cursor:pointer" onclick="Admin.toggleDayOff('${ds}')">${df} ✕</div>`;
              }).join('')}
            </div>
          </div>`:''}
      </div>
      <div class="sec-title">Рабочие часы</div>
      <div class="card">
        ${[1,2,3,4,5,6,0].map(dow=>{
          const s=S.schedule[dow]||{is_open:false,open_time:'09:00:00',close_time:'21:00:00'};
          return `<div class="day-toggle">
            <span class="day-name">${dNames[dow].slice(0,3)}</span>
            <div class="toggle-wrap">
              <div class="toggle ${s.is_open?'on':''}" onclick="Admin.togDay(${dow})" id="tog-${dow}"></div>
              <div class="time-range" id="tr-${dow}" style="${s.is_open?'':'opacity:0.3;pointer-events:none'}">
                <input class="time-input" type="time" value="${s.open_time.slice(0,5)}" id="open-${dow}">
                <span style="color:var(--muted);font-size:12px">–</span>
                <input class="time-input" type="time" value="${s.close_time.slice(0,5)}" id="close-${dow}">
              </div>
            </div>
          </div>`;}).join('')}
      </div>
      <div style="padding-top:10px"><button class="btn btn-gold" onclick="Admin.saveSched()">Сохранить рабочие часы</button></div>`;
  },
  async toggleDayOff(ds){
    try{
      if(S.daysOff[ds]){await SB.delete(`days_off?date=eq.${ds}`);delete S.daysOff[ds];showToast('Выходной снят');}
      else{const r=await SB.post('days_off',{date:ds});S.daysOff[ds]=r?.[0]?.id||ds;showToast('Выходной добавлен');}
      this.renderSchedule();
    }catch(e){showToast('Ошибка');}
  },
  schPrev(){if(S.schM===0){S.schM=11;S.schY--;}else S.schM--;this.renderSchedule();},
  schNext(){if(S.schM===11){S.schM=0;S.schY++;}else S.schM++;this.renderSchedule();},
  togDay(dow){const t=document.getElementById('tog-'+dow),r=document.getElementById('tr-'+dow);t.classList.toggle('on');const on=t.classList.contains('on');r.style.opacity=on?1:0.3;r.style.pointerEvents=on?'':'none';},
  async saveSched(){
    try{
      for(const dow of [0,1,2,3,4,5,6]){
        const t=document.getElementById('tog-'+dow);if(!t)continue;
        const isOpen=t.classList.contains('on');
        const open=(document.getElementById('open-'+dow)?.value||'09:00')+':00';
        const close=(document.getElementById('close-'+dow)?.value||'21:00')+':00';
        const ex=S.schedule[dow];
        if(ex?.id)await SB.patch(`schedule?id=eq.${ex.id}`,{is_open:isOpen,open_time:open,close_time:close});
        else await SB.post('schedule',{day_of_week:dow,is_open:isOpen,open_time:open,close_time:close});
      }
      showToast('График сохранён ✓');await loadSched();
    }catch(e){showToast('Ошибка');}
  },

  // КЛИЕНТЫ
  async renderClients(){
    const c=document.getElementById('admin-content');
    try{
      const all=await SB.get('bookings?order=created_at.desc')||[];
      // Клиенты с Telegram
      const tg={};
      all.filter(b=>b.client_telegram_id).forEach(b=>{
        const id=b.client_telegram_id;
        if(!tg[id])tg[id]={id,name:b.client_name||'Клиент',username:b.client_telegram_username,phone:b.client_phone,bookings:0,spent:0,isAdmin:id===String(CONFIG.ADMIN_TELEGRAM_ID)};
        tg[id].bookings++;
        if(b.status==='done')tg[id].spent+=(b.total_price||0);
      });
      // Клиенты без Telegram
      const noTg={};
      all.filter(b=>!b.client_telegram_id&&(b.client_name||b.client_phone)).forEach(b=>{
        const key=(b.client_name||'')+'_'+(b.client_phone||'');
        if(!noTg[key])noTg[key]={name:b.client_name||'Клиент',phone:b.client_phone,bookings:0,spent:0};
        noTg[key].bookings++;
        if(b.status==='done')noTg[key].spent+=(b.total_price||0);
      });
      const tgList=Object.values(tg).sort((a,b)=>b.bookings-a.bookings);
      const noTgList=Object.values(noTg).sort((a,b)=>b.bookings-a.bookings);
      c.innerHTML=`
        ${tgList.length?`
          <div class="sec-title">Через Telegram (${tgList.length})</div>
          ${tgList.map(cl=>`
            <div class="client-card">
              <div class="client-avatar">${cl.name.charAt(0).toUpperCase()}</div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap">
                  <span style="font-size:14px;color:var(--cream);font-weight:500">${cl.name}</span>
                  <span class="badge ${cl.isAdmin?'badge-admin':'badge-client'}">${cl.isAdmin?'Админ':'Клиент'}</span>
                </div>
                ${cl.username?`<div style="font-size:12px;color:var(--muted)">@${cl.username}</div>`:''}
                ${cl.phone?`<div style="font-size:12px;color:var(--muted)">${cl.phone}</div>`:''}
                <div style="font-size:11px;color:var(--muted);margin-top:3px">${cl.bookings} зап. · ${cl.spent.toLocaleString()} ₽</div>
              </div>
              <button class="btn-icon" style="font-size:16px;flex-shrink:0" title="${cl.isAdmin?'Снять права':'Назначить админом'}" onclick="Admin.toggleAdminRole('${cl.id}','${cl.name.replace(/'/g,"\\'")}',${cl.isAdmin})">${cl.isAdmin?'✕':'👑'}</button>
            </div>`).join('')}`:''}
        ${noTgList.length?`
          <div class="sec-title">Без Telegram (${noTgList.length})</div>
          ${noTgList.map(cl=>`
            <div class="client-card">
              <div class="client-avatar">${cl.name.charAt(0).toUpperCase()}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;color:var(--cream);font-weight:500;margin-bottom:2px">${cl.name}</div>
                ${cl.phone?`<div style="font-size:12px;color:var(--muted)">${cl.phone}</div>`:''}
                <div style="font-size:11px;color:var(--muted);margin-top:3px">${cl.bookings} зап. · ${cl.spent.toLocaleString()} ₽</div>
              </div>
            </div>`).join('')}`:''}
        ${!tgList.length&&!noTgList.length?'<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Клиентов пока нет</div></div>':''}`;
    }catch(e){document.getElementById('admin-content').innerHTML='<div class="empty"><div class="empty-text">Ошибка загрузки</div></div>';}
  },

  async toggleAdminRole(tgId,name,isAdmin){
    if(isAdmin&&tgId===String(CONFIG.ADMIN_TELEGRAM_ID)){showToast('Нельзя снять главного админа');return;}
    const msg=isAdmin?`Снять права администратора у ${name}?`:`Назначить ${name} администратором?`;
    if(!confirm(msg))return;
    try{
      if(isAdmin){
        await SB.delete(`admins?telegram_id=eq.${tgId}`);
        showToast('Права сняты');
      } else {
        await SB.post('admins',{telegram_id:tgId,name});
        showToast(`${name} — теперь администратор`);
      }
      this.renderClients();
    }catch(e){showToast('Ошибка (возможно нет таблицы admins)');}
  },
};

// ── INIT ──────────────────────────────────────
async function init(){
  await loadSvcs();
  const p = new URLSearchParams(window.location.search);
  const isAdminParam = p.get('admin')==='1' || TG?.initDataUnsafe?.start_param==='admin';
  if (TG_USER && isAdminParam) {
    // Проверяем — главный админ или в таблице admins
    const isMainAdmin = TG_USER.id === CONFIG.ADMIN_TELEGRAM_ID;
    let isDbAdmin = false;
    if (!isMainAdmin) {
      try {
        const rows = await SB.get(`admins?telegram_id=eq.${TG_USER.id}`) || [];
        isDbAdmin = rows.length > 0;
      } catch(e) {}
    }
    if (isMainAdmin || isDbAdmin) { Nav.go('admin'); return; }
  }
  Home.render();
}
init();
</script>
</body>
</html>
